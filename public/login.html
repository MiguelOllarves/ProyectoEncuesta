<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Puesto de Comando</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-800 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-800">Panel Estadístico</h2>
      <p class="text-gray-500 text-sm mt-1">Acceso restringido</p>
      <p class="text-gray-500 text-sm mt-2">Usuario: <span class="font-semibold">admin</span> | Contraseña: <span class="font-semibold">admin123</span></p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700">Usuario</label>
        <input type="text" name="usuario" required
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border focus:border-blue-500 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Contraseña</label>
        <div class="relative mt-1">
          <input type="password" id="passwordInput" name="password" required
            class="block w-full rounded-md border-gray-300 shadow-sm p-3 border focus:border-blue-500 focus:ring-blue-500 pr-10">

          <button type="button" id="togglePassword"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
        class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 px-4 rounded transition duration-200">
        Ingresar
      </button>

      <div id="mensajeError" class="hidden text-red-500 text-center text-sm font-medium mt-2"></div>
    </form>
  </div>

  <script>
    // 1. Lógica del "Ojito" para ver/ocultar contraseña
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('passwordInput');

    togglePassword.addEventListener('click', function () {
      // Alternar el tipo de input
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      // Cambiar opacidad del ícono para indicar estado
      if (type === 'text') {
        this.classList.add('text-blue-600');
      } else {
        this.classList.remove('text-blue-600');
      }
    });

    // 2. Lógica de envío de datos a la API
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      const mensajeError = document.getElementById('mensajeError');

      mensajeError.classList.add('hidden');

      try {
        const response = await fetch('/api/auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
          // Si el login es exitoso, guardamos el token en localStorage y redirigimos
          localStorage.setItem('adminToken', result.token);
          window.location.href = '/dashboard.html';
        } else {
          // Mostrar error
          mensajeError.textContent = result.error;
          mensajeError.classList.remove('hidden');
        }
      } catch (error) {
        mensajeError.textContent = "Error de conexión con el servidor.";
        mensajeError.classList.remove('hidden');
      }
    });
  </script>
</body>

</html>
